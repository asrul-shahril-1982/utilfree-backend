# ── PRODUCTION PROFILE ───────────────────────────────────────────────
# Activated with: --spring.profiles.active=production
# On Render.com: set SPRING_PROFILES_ACTIVE=production as env variable

# ── DATABASE ─────────────────────────────────────────────────────────
# Override these via environment variables on your host:
# SPRING_DATASOURCE_URL
# SPRING_DATASOURCE_USERNAME
# SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/utilfree_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:utilfree_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}

# ── EMAIL ─────────────────────────────────────────────────────────────
spring.mail.host=${SPRING_MAIL_HOST:mail.optimaxglobal.com}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@optimaxglobal.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# ── APP ───────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://utilfree.optimaxglobal.com}
app.contact.recipient=${APP_CONTACT_RECIPIENT:admin@optimaxglobal.com}
app.contact.from=${APP_CONTACT_FROM:noreply@optimaxglobal.com}

# ── JPA (no DDL changes in production) ───────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── LOGGING ───────────────────────────────────────────────────────────
logging.level.app.utilfree=WARN
logging.level.org.springframework=ERROR
