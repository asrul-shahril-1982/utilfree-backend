# ── APP ─────────────────────────────────────────────────────────────
spring.application.name=UtilFree Backend
server.port=3001

# ── DATABASE (MySQL via cPanel phpMyAdmin) ───────────────────────────
# Replace these values with your cPanel MySQL credentials
spring.datasource.url=jdbc:mysql://localhost:3306/YOUR_DB_NAME?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── EMAIL (cPanel SMTP) ──────────────────────────────────────────────
# Replace with your cPanel email account credentials
spring.mail.host=mail.optimaxglobal.com
spring.mail.port=465
spring.mail.username=noreply@utilfree.optimaxglobal.com
spring.mail.password=YOUR_EMAIL_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=mail.optimaxglobal.com

# ── CORS ─────────────────────────────────────────────────────────────
app.cors.allowed-origins=https://utilfree.optimaxglobal.com,http://localhost:3000

# ── CONTACT EMAIL RECIPIENT ──────────────────────────────────────────
app.contact.recipient=admin@utilfree.optimaxglobal.com
app.contact.from=noreply@utilfree.optimaxglobal.com

# ── COMPRESSION ──────────────────────────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html
server.compression.min-response-size=1024

# ── LOGGING ──────────────────────────────────────────────────────────
logging.level.app.utilfree=INFO
logging.level.org.springframework.web=WARN
